<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtCart - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Young+Serif&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <main class="auth-main">
      <div class="auth-container">
        <!-- Logo -->
        <a href="index.html" class="auth-logo">
          <span class="material-symbols-rounded">palette</span>
          <h1>ArtCart</h1>
        </a>

        <h2 class="auth-title">sign up</h2>

        <form class="auth-form" id="signup-form">
          <div class="form-group">
            <label for="signup-email">Email <span class="required">*</span></label>
            <input type="email" id="signup-email" name="email" required placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label for="signup-password">Password <span class="required">*</span></label>
            <input type="password" id="signup-password" name="password" required placeholder="Create a password">
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password <span class="required">*</span></label>
            <input type="password" id="signup-confirm" name="confirm" required placeholder="Confirm your password">
          </div>
          <button type="submit" class="btn-auth">Sign Up</button>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
